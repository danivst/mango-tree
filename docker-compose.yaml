services:
  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - NODE_ENV=production
      - USE_SECURE_COOKIES=false
      - DATABASE_URL=mongodb://mongo:27017/mangotree
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app/backend         
      - /app/backend/node_modules  
      - /app/backend/dist             
      - ./shared:/app/shared

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:80"